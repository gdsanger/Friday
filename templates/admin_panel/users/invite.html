{% extends 'admin_panel/base_admin.html' %}

{% block page_title %}User einladen{% endblock %}

{% block admin_content %}
<div class="mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h2>User einladen</h2>
            <p class="text-muted">User direkt aus Azure AD suchen und vorprovisionieren</p>
        </div>
        <a href="{% url 'admin_panel:admin-users' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Zurück zur Liste
        </a>
    </div>
</div>

<!-- Search Box -->
<div class="card mb-4">
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label fw-medium">
                <i class="bi bi-search me-2"></i>
                Name oder E-Mail suchen
            </label>
            <input type="search"
                   name="q"
                   placeholder="Name oder E-Mail-Adresse eingeben..."
                   class="form-control form-control-lg"
                   hx-get="{% url 'admin_panel:admin-user-invite-search' %}"
                   hx-trigger="keyup changed delay:400ms"
                   hx-target="#invite-results"
                   hx-indicator="#search-spinner"
                   autofocus>
        </div>

        <div id="search-spinner" class="htmx-indicator mt-2">
            <span class="spinner-border spinner-border-sm me-2"></span>
            Suche in Azure AD...
        </div>
    </div>
</div>

<!-- Results Container -->
<div id="invite-results"></div>

<style>
.htmx-indicator {
    display: none;
    color: var(--bs-secondary);
    font-size: 14px;
}
.htmx-request .htmx-indicator {
    display: inline-block;
}
</style>
{% endblock %}

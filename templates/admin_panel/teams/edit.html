{% extends 'admin_panel/base_admin.html' %}

{% block page_title %}Edit Team - {{ team.name }}{% endblock %}

{% block admin_content %}
<div class="mb-4">
    <a href="{% url 'admin_panel:admin-teams' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Teams
    </a>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Edit Team: {{ team.name }}</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Team Name *</label>
                <input type="text" class="form-control" name="name" value="{{ team.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3">{{ team.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Color</label>
                <input type="color" class="form-control form-control-color" name="color" value="{{ team.color }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Icon (Bootstrap Icon name)</label>
                <input type="text" class="form-control" name="icon" value="{{ team.icon }}" placeholder="e.g., people-fill">
                <div class="form-text">Leave empty for no icon</div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if team.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">
                    Team is active
                </label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'admin_panel:admin-teams' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block title %}Calendar · Friday{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
<style>
  #gantt-container {
    width: 100%;
    height: calc(100vh - 140px);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--friday-border);
  }
  /* Match Friday dark/light theme */
  [data-bs-theme="dark"] .gantt_container {
    background: var(--friday-surface);
    color: var(--friday-text);
  }
  [data-bs-theme="dark"] .gantt_grid_head_cell,
  [data-bs-theme="dark"] .gantt_scale_cell {
    background: var(--friday-surface-alt);
    color: var(--friday-text-muted);
    border-color: var(--friday-border);
  }
  [data-bs-theme="dark"] .gantt_row,
  [data-bs-theme="dark"] .gantt_grid_data .gantt_cell {
    background: var(--friday-surface);
    border-color: var(--friday-border);
    color: var(--friday-text);
  }
  [data-bs-theme="dark"] .gantt_row:hover,
  [data-bs-theme="dark"] .gantt_grid_data .gantt_row:hover {
    background: var(--friday-surface-alt);
  }
  /* Weekend highlighting */
  .weekend-cell {
    background: rgba(107, 114, 128, 0.08) !important;
  }
  [data-bs-theme="dark"] .weekend-cell {
    background: rgba(255, 255, 255, 0.03) !important;
  }
  /* Minimum bar width for narrow tasks (Fix 5) */
  .gantt-task-narrow .gantt_task_content {
    min-width: 24px;
  }
  .gantt_task_line.gantt-task-narrow {
    min-width: 24px !important;
  }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Project Calendar</h4>
  <div class="d-flex gap-2">
    <!-- View switcher -->
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary"
              onclick="setScale('month')">Month</button>
      <button class="btn btn-outline-secondary active"
              onclick="setScale('quarter')">Quarter</button>
      <button class="btn btn-outline-secondary"
              onclick="setScale('year')">Year</button>
    </div>
    <!-- Resource toggle -->
    <button class="btn btn-outline-secondary btn-sm"
            id="resource-toggle"
            onclick="toggleResourceView()">
      <i class="bi bi-people"></i> Resource View
    </button>
  </div>
</div>

<div id="gantt-container"></div>
{% endblock %}

{% block extra_js %}
<!-- DHTMLX must load FIRST before any gantt.* calls -->
<script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
<script>
// ── DHTMLX Gantt Configuration ────────────────────────────────

gantt.config.date_format         = "%Y-%m-%d";
gantt.config.drag_progress       = false;
gantt.config.drag_resize         = true;
gantt.config.drag_move           = true;
gantt.config.fit_tasks           = true;
gantt.config.open_tree_initially = true;
gantt.config.xml_date            = "%Y-%m-%d";  // extra safety

// ── Helper — format date string for display ───────────────────
// Called at RENDER TIME (inside template functions), not at definition time
function fmtDate(dateStr) {
  if (!dateStr) return '';
  // dateStr is always a plain string "YYYY-MM-DD" at this point
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length !== 3) return dateStr;
  return `${parts[2]}.${parts[1]}.${parts[0]}`;  // dd.mm.YYYY
}

// Fix 3: Short date format for grid columns (dd.mm.YY)
function fmtShort(dateStr) {
  if (!dateStr) return '—';
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length !== 3) return dateStr;
  return `${parts[2]}.${parts[1]}.${parts[0].slice(2)}`; // dd.mm.YY
}

// ── Grid columns ──────────────────────────────────────────────
gantt.config.columns = [
  {
    name: "text", label: "Project / Task",
    tree: true, width: 220,
    template: (task) => task.type === 'milestone'
      ? `<span style="padding-left:16px;font-size:12px;opacity:.7">${task.text}</span>`
      : task.type === 'project'
        ? `<span style="font-weight:600">${task.text}</span>`
        : `<span style="padding-left:16px;font-size:13px">${task.text}</span>`
  },
  {
    name: "start_date", label: "Start",
    align: "center", width: 70,
    template: (task) => (task.type === 'milestone' || task.type === 'project')
      ? '' : fmtShort(task.start_date)
  },
  {
    name: "due", label: "Deadline",
    align: "center", width: 70,
    template: (task) => fmtShort(task.end_date || task.start_date)
  },
  {
    name: "sp", label: "SP",
    align: "center", width: 50,
    template: (task) => {
      if (!task.story_points) return '';
      // Fix 6: Highlight SP > 40 in red/bold
      const warn = task.story_points > 40
        ? 'style="color:#e55039; font-weight:700;"' : '';
      return `<span ${warn} style="font-family:monospace;font-size:12px;">${task.story_points}</span>`;
    }
  },
];

// ── Task styling ──────────────────────────────────────────────
gantt.templates.task_class = (start, end, task) => {
  const classes = [];
  if (task.type === 'milestone') classes.push('gantt-milestone');
  if (task.type === 'project')   classes.push('gantt-project-bar');
  if (task.type === 'task')      classes.push('gantt-task-bar');

  // Fix 5: Very short tasks → extra class for minimum width
  const diffDays = (end - start) / (1000 * 60 * 60 * 24);
  if (diffDays < 2 && task.type === 'task') {
    classes.push('gantt-task-narrow');
  }
  return classes.join(' ');
};

gantt.templates.task_style = (start, end, task) => {
  // Projektbalken: Projektfarbe
  if (task.type === 'project') {
    return task.color
      ? `background:${task.color}; border-color:${task.color};`
      : '';
  }

  // Task-Balken: Status-Farbe
  const statusColors = {
    'backlog':     '#6b7280',
    'todo':        '#3b82f6',
    'in_progress': '#f59e0b',
    'review':      '#8b5cf6',
    'done':        '#10b981',
  };
  const color = statusColors[task.status] || task.color || '#3b82f6';
  return `background:${color}; border-color:${color};`;
};

gantt.templates.task_text = (start, end, task) =>
  task.type === 'milestone' ? task.text : '';

// ── Plugins ───────────────────────────────────────────────────
gantt.plugins({ marker: true, tooltip: true });

// ── Tooltip ───────────────────────────────────────────────────
gantt.templates.tooltip_text = (start, end, task) => {
  if (task.type === 'project') {
    return `<b>${task.text}</b>`;
  }
  if (task.type === 'milestone') {
    return `<b>${task.text}</b><br>Deadline: ${fmtDate(task.start_date)}`;
  }

  const sp    = task.story_points;
  const days  = task.working_days;
  const warn  = sp && sp > 40 ? ' ⚠️ Sehr hoher Aufwand!' : '';
  const spStr = sp ? `${sp} SP (${days} AT)${warn}` : '—';

  return `
    <b>${task.text}</b><br>
    Start: ${fmtDate(task.start_date)}<br>
    Deadline: ${fmtDate(task.end_date)}<br>
    Aufwand: ${spStr}<br>
    Status: ${task.status_label || '—'}<br>
    ${task.resource_label ? `Bearbeiter: ${task.resource_label}` : ''}
  `.trim();
};

// ── Weekend highlighting ──────────────────────────────────────
gantt.templates.scale_cell_class = (date) => {
  if (date.getDay() === 0 || date.getDay() === 6) {
    return 'weekend-cell';
  }
  return '';
};

gantt.templates.timeline_cell_class = (task, date) => {
  if (date.getDay() === 0 || date.getDay() === 6) {
    return 'weekend-cell';
  }
  return '';
};

// ── Scale ─────────────────────────────────────────────────────
// Fix 2: Define SCALES object with custom format functions
const SCALES = {
  month: [
    { unit: "month", step: 1, format: "%B %Y" },
    { unit: "week",  step: 1, format: function(date) {
        // KW-Nummer berechnen (ISO 8601 week number)
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return `KW ${weekNo}`;
    }},
  ],
  quarter: [
    { unit: "quarter", step: 1, format: function(date) {
        const q = Math.floor(date.getMonth() / 3) + 1;
        return `Q${q} ${date.getFullYear()}`;
    }},
    { unit: "month", step: 1, format: function(date) {
        const months = ['Jan','Feb','Mär','Apr','Mai','Jun',
                        'Jul','Aug','Sep','Okt','Nov','Dez'];
        return months[date.getMonth()];
    }},
  ],
  year: [
    { unit: "year",  step: 1, format: "%Y" },
    { unit: "quarter", step: 1, format: function(date) {
        const q = Math.floor(date.getMonth() / 3) + 1;
        return `Q${q}`;
    }},
  ],
};

// Initial scale: Quarter view
gantt.config.scales = SCALES.quarter;

// ── Init BEFORE parse ─────────────────────────────────────────
gantt.init("gantt-container");

// Today marker — AFTER init
gantt.addMarker({
  start_date: new Date(),
  css:        "gantt-today-marker",
  text:       "Today",
});

// ── Events ────────────────────────────────────────────────────
gantt.attachEvent("onTaskClick", (id, e) => {
  const task = gantt.getTask(id);
  if (task.task_id) {
    htmx.ajax('GET', `/tasks/${task.task_id}/detail/`, {
      target: '#slide-over',
      swap:   'innerHTML',
    });
  }
  return true;
});

gantt.attachEvent("onAfterTaskDrag", (id, mode) => {
  const task = gantt.getTask(id);
  if (task.type !== 'project') return;
  const fmt = gantt.date.date_to_str("%Y-%m-%d");
  fetch("{% url 'projects:calendar-update' %}", {
    method:  'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken':  getCsrfToken(),
    },
    body: JSON.stringify({
      type:       'project',
      id:         task.project_id,
      start_date: fmt(task.start_date),
      end_date:   fmt(task.end_date),
    }),
  });
});

// ── Load data ─────────────────────────────────────────────────
fetch("{% url 'projects:calendar-data' %}")
  .then(r => r.json())
  .then(data => {
    // Normalize: guarantee all date fields are plain "YYYY-MM-DD" strings
    // This prevents DHTMLX from receiving Date objects or ISO datetime strings
    const normalize = (dateVal) => {
      if (!dateVal) return null;
      return String(dateVal).split('T')[0];
    };

    data.data = data.data.map(task => ({
      ...task,
      start_date: normalize(task.start_date),
      end_date:   normalize(task.end_date),
    }));

    gantt.parse({ data: data.data, links: data.links || [] });
    window._ganttResources = data.resources || [];

    // Fix 1: Center today's date in view (scroll to show today at ~25% from left)
    setTimeout(() => {
      const today = new Date();
      const posX = gantt.posFromDate(today);
      const chartWidth = gantt.$container?.querySelector('.gantt_task')?.offsetWidth || 800;
      const scrollTo = Math.max(0, posX - chartWidth * 0.25);
      gantt.scrollTo(scrollTo, 0);
    }, 100); // Small delay to ensure gantt is fully rendered
  })
  .catch(err => console.error('Gantt data load failed:', err));

// ── Scale switcher ────────────────────────────────────────────
function setScale(mode) {
  document.querySelectorAll('.btn-group .btn')
    .forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  gantt.config.scales = SCALES[mode] || SCALES.quarter;
  gantt.render();
}

// ── Resource view toggle ──────────────────────────────────────
let resourceMode = false;
const baseColumns = [...gantt.config.columns];

function toggleResourceView() {
  resourceMode = !resourceMode;
  document.getElementById('resource-toggle')
    .classList.toggle('btn-primary', resourceMode);

  if (resourceMode) {
    gantt.config.columns = [
      { name: "resource", label: "Ressource", width: 130,
        template: (task) => {
          // Fix 4: Show "Projekt" for project rows
          if (task.type === 'project') {
            return `<span style="font-size:11px; color:var(--bs-secondary-color);
                             font-style:italic;">Projekt</span>`;
          }
          if (task.resource_label) {
            return `<span style="font-size:12px;">${task.resource_label}</span>`;
          }
          return `<span style="font-size:11px; color:var(--bs-secondary-color);">—</span>`;
        }
      },
      ...baseColumns,
    ];
  } else {
    gantt.config.columns = baseColumns;
  }
  gantt.render();
}

// ── CSRF helper ───────────────────────────────────────────────
function getCsrfToken() {
  return document.cookie.split(';')
    .find(c => c.trim().startsWith('csrftoken='))
    ?.split('=')[1] ?? '';
}
</script>
{% endblock %}

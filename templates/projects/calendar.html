{% extends "base.html" %}
{% load static %}

{% block title %}Calendar · Friday{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
<style>
  #gantt-container {
    width: 100%;
    height: calc(100vh - 140px);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--friday-border);
  }
  /* Match Friday dark/light theme */
  [data-bs-theme="dark"] .gantt_container {
    background: var(--friday-surface);
    color: var(--friday-text);
  }
  [data-bs-theme="dark"] .gantt_grid_head_cell,
  [data-bs-theme="dark"] .gantt_scale_cell {
    background: var(--friday-surface-alt);
    color: var(--friday-text-muted);
    border-color: var(--friday-border);
  }
  [data-bs-theme="dark"] .gantt_row,
  [data-bs-theme="dark"] .gantt_grid_data .gantt_cell {
    background: var(--friday-surface);
    border-color: var(--friday-border);
    color: var(--friday-text);
  }
  [data-bs-theme="dark"] .gantt_row:hover,
  [data-bs-theme="dark"] .gantt_grid_data .gantt_row:hover {
    background: var(--friday-surface-alt);
  }
  /* Weekend highlighting */
  .weekend-cell {
    background: rgba(107, 114, 128, 0.08) !important;
  }
  [data-bs-theme="dark"] .weekend-cell {
    background: rgba(255, 255, 255, 0.03) !important;
  }
  /* Minimum bar width for narrow tasks (Fix 5) */
  .gantt-task-narrow .gantt_task_content {
    min-width: 24px;
  }
  .gantt_task_line.gantt-task-narrow {
    min-width: 24px !important;
  }

  /* ── Filter Bar Styling ───────────────────────────────────── */
  .calendar-filter-bar {
    background: var(--friday-surface);
    border: 1px solid var(--friday-border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--friday-text-muted);
    margin-bottom: 0;
  }

  .filter-separator {
    flex: 1;
  }

  .filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--friday-accent-light);
    color: var(--friday-accent);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .filter-badge button {
    background: none;
    border: none;
    padding: 0;
    color: var(--friday-accent);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Project Calendar</h4>
  <div class="d-flex gap-2">
    <!-- View switcher -->
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary"
              onclick="setScale('month')">Month</button>
      <button class="btn btn-outline-secondary active"
              onclick="setScale('quarter')">Quarter</button>
      <button class="btn btn-outline-secondary"
              onclick="setScale('year')">Year</button>
    </div>
    <!-- Resource toggle -->
    <button class="btn btn-outline-secondary btn-sm"
            id="resource-toggle"
            onclick="toggleResourceView()">
      <i class="bi bi-people"></i> Resource View
    </button>
  </div>
</div>

<!-- Filter Bar -->
<div class="calendar-filter-bar d-flex flex-wrap gap-2 align-items-center mb-3"
     id="calendar-filters">

  <!-- Projekt Filter -->
  <div class="filter-group">
    <label class="filter-label">Projekt</label>
    <select id="filter-project" class="form-select form-select-sm"
            onchange="applyGanttFilters()" style="min-width:160px;">
      <option value="">Alle Projekte</option>
    </select>
  </div>

  <!-- Team Filter -->
  <div class="filter-group">
    <label class="filter-label">Team</label>
    <select id="filter-team" class="form-select form-select-sm"
            onchange="applyGanttFilters()" style="min-width:140px;">
      <option value="">Alle Teams</option>
    </select>
  </div>

  <!-- Bearbeiter Filter -->
  <div class="filter-group">
    <label class="filter-label">Bearbeiter</label>
    <select id="filter-user" class="form-select form-select-sm"
            onchange="applyGanttFilters()" style="min-width:150px;">
      <option value="">Alle Bearbeiter</option>
    </select>
  </div>

  <!-- Mandant Filter -->
  <div class="filter-group">
    <label class="filter-label">Mandant</label>
    <select id="filter-client" class="form-select form-select-sm"
            onchange="applyGanttFilters()" style="min-width:140px;">
      <option value="">Alle Mandanten</option>
    </select>
  </div>

  <!-- Separator -->
  <div class="filter-separator"></div>

  <!-- Aktive Filter Anzeige -->
  <div id="active-filter-badges" class="d-flex flex-wrap gap-1"></div>

  <!-- Reset -->
  <button class="btn btn-outline-secondary btn-sm"
          id="filter-reset-btn"
          onclick="resetGanttFilters()"
          style="display:none;">
    <i class="bi bi-x-circle me-1"></i>Zurücksetzen
  </button>

</div>

<div id="gantt-container"></div>
{% endblock %}

{% block extra_js %}
<!-- DHTMLX must load FIRST before any gantt.* calls -->
<script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
<script>
// ── DHTMLX Gantt Configuration ────────────────────────────────

gantt.config.date_format         = "%Y-%m-%d";
gantt.config.drag_progress       = false;
gantt.config.drag_resize         = true;
gantt.config.drag_move           = true;
gantt.config.fit_tasks           = true;
gantt.config.open_tree_initially = true;
gantt.config.xml_date            = "%Y-%m-%d";  // extra safety

// ── Helper — format date string for display ───────────────────
// Called at RENDER TIME (inside template functions), not at definition time
function fmtDate(dateStr) {
  if (!dateStr) return '';
  // dateStr is always a plain string "YYYY-MM-DD" at this point
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length !== 3) return dateStr;
  return `${parts[2]}.${parts[1]}.${parts[0]}`;  // dd.mm.YYYY
}

// Fix 3: Short date format for grid columns (dd.mm.YY)
function fmtShort(dateStr) {
  if (!dateStr) return '—';
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length !== 3) return dateStr;
  return `${parts[2]}.${parts[1]}.${parts[0].slice(2)}`; // dd.mm.YY
}

// ── Grid columns ──────────────────────────────────────────────
gantt.config.columns = [
  {
    name: "text", label: "Project / Task",
    tree: true, width: 220,
    template: (task) => task.type === 'milestone'
      ? `<span style="padding-left:16px;font-size:12px;opacity:.7">${task.text}</span>`
      : task.type === 'project'
        ? `<span style="font-weight:600">${task.text}</span>`
        : `<span style="padding-left:16px;font-size:13px">${task.text}</span>`
  },
  {
    name: "start_date", label: "Start",
    align: "center", width: 70,
    template: (task) => (task.type === 'milestone' || task.type === 'project')
      ? '' : fmtShort(task.start_date)
  },
  {
    name: "due", label: "Deadline",
    align: "center", width: 70,
    template: (task) => fmtShort(task.end_date || task.start_date)
  },
  {
    name: "sp", label: "SP",
    align: "center", width: 50,
    template: (task) => {
      if (!task.story_points) return '';
      // Fix 6: Highlight SP > 40 in red/bold
      const warn = task.story_points > 40
        ? 'style="color:#e55039; font-weight:700;"' : '';
      return `<span ${warn} style="font-family:monospace;font-size:12px;">${task.story_points}</span>`;
    }
  },
];

// ── Task styling ──────────────────────────────────────────────
gantt.templates.task_class = (start, end, task) => {
  const classes = [];
  if (task.type === 'milestone') classes.push('gantt-milestone');
  if (task.type === 'project')   classes.push('gantt-project-bar');
  if (task.type === 'task')      classes.push('gantt-task-bar');

  // Fix 5: Very short tasks → extra class for minimum width
  const diffDays = (end - start) / (1000 * 60 * 60 * 24);
  if (diffDays < 2 && task.type === 'task') {
    classes.push('gantt-task-narrow');
  }
  return classes.join(' ');
};

gantt.templates.task_style = (start, end, task) => {
  // Projektbalken: Projektfarbe
  if (task.type === 'project') {
    return task.color
      ? `background:${task.color}; border-color:${task.color};`
      : '';
  }

  // Task-Balken: Status-Farbe
  const statusColors = {
    'backlog':     '#6b7280',
    'todo':        '#3b82f6',
    'in_progress': '#f59e0b',
    'review':      '#8b5cf6',
    'done':        '#10b981',
  };
  const color = statusColors[task.status] || task.color || '#3b82f6';
  return `background:${color}; border-color:${color};`;
};

gantt.templates.task_text = (start, end, task) =>
  task.type === 'milestone' ? task.text : '';

// ── Plugins ───────────────────────────────────────────────────
gantt.plugins({ marker: true, tooltip: true });

// ── Tooltip ───────────────────────────────────────────────────
gantt.templates.tooltip_text = (start, end, task) => {
  if (task.type === 'project') {
    return `<b>${task.text}</b>`;
  }
  if (task.type === 'milestone') {
    return `<b>${task.text}</b><br>Deadline: ${fmtDate(task.start_date)}`;
  }

  const sp    = task.story_points;
  const days  = task.working_days;
  const warn  = sp && sp > 40 ? ' ⚠️ Sehr hoher Aufwand!' : '';
  const spStr = sp ? `${sp} SP (${days} AT)${warn}` : '—';

  return `
    <b>${task.text}</b><br>
    Start: ${fmtDate(task.start_date)}<br>
    Deadline: ${fmtDate(task.end_date)}<br>
    Aufwand: ${spStr}<br>
    Status: ${task.status_label || '—'}<br>
    ${task.resource_label ? `Bearbeiter: ${task.resource_label}` : ''}
  `.trim();
};

// ── Weekend highlighting ──────────────────────────────────────
gantt.templates.scale_cell_class = (date) => {
  if (date.getDay() === 0 || date.getDay() === 6) {
    return 'weekend-cell';
  }
  return '';
};

gantt.templates.timeline_cell_class = (task, date) => {
  if (date.getDay() === 0 || date.getDay() === 6) {
    return 'weekend-cell';
  }
  return '';
};

// ── Scale ─────────────────────────────────────────────────────
// Fix 2: Define SCALES object with custom format functions
const SCALES = {
  month: [
    { unit: "month", step: 1, format: "%B %Y" },
    { unit: "week",  step: 1, format: function(date) {
        // KW-Nummer berechnen (ISO 8601 week number)
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return `KW ${weekNo}`;
    }},
  ],
  quarter: [
    { unit: "quarter", step: 1, format: function(date) {
        const q = Math.floor(date.getMonth() / 3) + 1;
        return `Q${q} ${date.getFullYear()}`;
    }},
    { unit: "month", step: 1, format: function(date) {
        const months = ['Jan','Feb','Mär','Apr','Mai','Jun',
                        'Jul','Aug','Sep','Okt','Nov','Dez'];
        return months[date.getMonth()];
    }},
  ],
  year: [
    { unit: "year",  step: 1, format: "%Y" },
    { unit: "quarter", step: 1, format: function(date) {
        const q = Math.floor(date.getMonth() / 3) + 1;
        return `Q${q}`;
    }},
  ],
};

// Initial scale: Quarter view
gantt.config.scales = SCALES.quarter;

// ── Gantt Filter Logic ───────────────────────────────────────

// Active filters state
const _filters = {
  project: '',
  team:    '',
  user:    '',
  client:  '',
};

// Populate filter dropdowns with data from API
function populateFilterDropdowns(filterOptions) {
  const { projects, teams, users, clients } = filterOptions;

  const projectSel = document.getElementById('filter-project');
  projects.forEach(p => {
    const opt = new Option(p.name, p.id);
    projectSel.appendChild(opt);
  });

  const teamSel = document.getElementById('filter-team');
  teams.forEach(t => {
    const opt = new Option(t.name, t.id);
    teamSel.appendChild(opt);
  });

  const userSel = document.getElementById('filter-user');
  users.forEach(u => {
    const opt = new Option(u.name, u.id);
    userSel.appendChild(opt);
  });

  const clientSel = document.getElementById('filter-client');
  clients.forEach(c => {
    const opt = new Option(c.name, c.id);
    clientSel.appendChild(opt);
  });
}

// Apply DHTMLX Gantt filters
function applyGanttFilters() {
  _filters.project = document.getElementById('filter-project').value;
  _filters.team    = document.getElementById('filter-team').value;
  _filters.user    = document.getElementById('filter-user').value;
  _filters.client  = document.getElementById('filter-client').value;

  gantt.refreshData();
  updateFilterBadges();
  updateResetButton();
}

// Helper function: check if a project has at least one visible child task
function projectHasVisibleChildren(projectGanttId) {
  let hasVisible = false;

  gantt.eachTask((child) => {
    if (hasVisible) return; // early exit
    if (String(child.parent) !== String(projectGanttId)) return;
    if (child.type === 'project') return;

    // Check child task against active filters
    if (_filters.project && child.project_id !== _filters.project) return;
    if (_filters.team    && child.team_id    !== _filters.team)    return;
    if (_filters.user    && child.user_id    !== _filters.user)    return;
    if (_filters.client  && child.client_id  !== _filters.client)  return;

    hasVisible = true;
  });

  return hasVisible;
}

// DHTMLX onBeforeTaskDisplay callback — return true to show, false to hide
gantt.attachEvent('onBeforeTaskDisplay', (id, task) => {
  const hasActiveFilter = Object.values(_filters).some(v => v !== '');

  if (task.type === 'project') {
    // No filter active → show all projects
    if (!hasActiveFilter) return true;

    // Filter active → check project-level filters first
    if (_filters.project && task.project_id !== _filters.project) return false;
    if (_filters.client  && task.client_id  !== _filters.client)  return false;

    // Has this project any visible child tasks?
    return projectHasVisibleChildren(id);
  }

  // Task / Milestone: apply all filters
  if (_filters.project && task.project_id !== _filters.project) return false;
  if (_filters.team    && task.team_id    !== _filters.team)    return false;
  if (_filters.user    && task.user_id    !== _filters.user)    return false;
  if (_filters.client  && task.client_id  !== _filters.client)  return false;

  return true;
});

// Reset all filters
function resetGanttFilters() {
  _filters.project = _filters.team = _filters.user = _filters.client = '';

  document.getElementById('filter-project').value = '';
  document.getElementById('filter-team').value    = '';
  document.getElementById('filter-user').value    = '';
  document.getElementById('filter-client').value  = '';

  gantt.refreshData();
  updateFilterBadges();
  updateResetButton();
}

// Remove a single filter
function removeFilter(key) {
  _filters[key] = '';
  document.getElementById(`filter-${key}`).value = '';
  gantt.refreshData();
  updateFilterBadges();
  updateResetButton();
}

// Update active filter badges
function updateFilterBadges() {
  const container = document.getElementById('active-filter-badges');
  container.innerHTML = '';

  const labels = {
    project: document.getElementById('filter-project'),
    team:    document.getElementById('filter-team'),
    user:    document.getElementById('filter-user'),
    client:  document.getElementById('filter-client'),
  };

  Object.entries(_filters).forEach(([key, val]) => {
    if (!val) return;
    const sel   = labels[key];
    const label = sel?.options[sel.selectedIndex]?.text || val;
    const badge = document.createElement('span');
    badge.className = 'filter-badge';
    badge.innerHTML = `
      ${label}
      <button onclick="removeFilter('${key}')" title="Filter entfernen">
        <i class="bi bi-x"></i>
      </button>
    `;
    container.appendChild(badge);
  });
}

// Show/hide reset button
function updateResetButton() {
  const hasFilters = Object.values(_filters).some(v => v !== '');
  const btn = document.getElementById('filter-reset-btn');
  if (btn) btn.style.display = hasFilters ? 'inline-flex' : 'none';
}

// ── Init BEFORE parse ─────────────────────────────────────────
gantt.init("gantt-container");

// Today marker — AFTER init
gantt.addMarker({
  start_date: new Date(),
  css:        "gantt-today-marker",
  text:       "Today",
});

// ── Events ────────────────────────────────────────────────────
gantt.attachEvent("onTaskClick", (id, e) => {
  const task = gantt.getTask(id);
  if (task.task_id) {
    htmx.ajax('GET', `/tasks/${task.task_id}/detail/`, {
      target: '#slide-over',
      swap:   'innerHTML',
    });
  }
  return true;
});

gantt.attachEvent("onAfterTaskDrag", (id, mode) => {
  const task = gantt.getTask(id);
  if (task.type !== 'project') return;
  const fmt = gantt.date.date_to_str("%Y-%m-%d");
  fetch("{% url 'projects:calendar-update' %}", {
    method:  'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken':  getCsrfToken(),
    },
    body: JSON.stringify({
      type:       'project',
      id:         task.project_id,
      start_date: fmt(task.start_date),
      end_date:   fmt(task.end_date),
    }),
  });
});

// ── Load data ─────────────────────────────────────────────────
fetch("{% url 'projects:calendar-data' %}")
  .then(r => r.json())
  .then(data => {
    // Normalize: guarantee all date fields are plain "YYYY-MM-DD" strings
    // This prevents DHTMLX from receiving Date objects or ISO datetime strings
    const normalize = (dateVal) => {
      if (!dateVal) return null;
      return String(dateVal).split('T')[0];
    };

    data.data = data.data.map(task => ({
      ...task,
      start_date: normalize(task.start_date),
      end_date:   normalize(task.end_date),
    }));

    gantt.parse({ data: data.data, links: data.links || [] });
    window._ganttResources = data.resources || [];

    // Populate filter dropdowns
    if (data.filter_options) {
      populateFilterDropdowns(data.filter_options);
    }

    // Fix 1: Center today's date in view (scroll to show today at ~25% from left)
    setTimeout(() => {
      const today = new Date();
      const posX = gantt.posFromDate(today);
      const chartWidth = gantt.$container?.querySelector('.gantt_task')?.offsetWidth || 800;
      const scrollTo = Math.max(0, posX - chartWidth * 0.25);
      gantt.scrollTo(scrollTo, 0);
    }, 100); // Small delay to ensure gantt is fully rendered
  })
  .catch(err => console.error('Gantt data load failed:', err));

// ── Scale switcher ────────────────────────────────────────────
function setScale(mode) {
  document.querySelectorAll('.btn-group .btn')
    .forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  gantt.config.scales = SCALES[mode] || SCALES.quarter;
  gantt.render();
}

// ── Resource view toggle ──────────────────────────────────────
let resourceMode = false;
const baseColumns = [...gantt.config.columns];

function toggleResourceView() {
  resourceMode = !resourceMode;
  document.getElementById('resource-toggle')
    .classList.toggle('btn-primary', resourceMode);

  if (resourceMode) {
    gantt.config.columns = [
      { name: "resource", label: "Ressource", width: 130,
        template: (task) => {
          // Fix 4: Show "Projekt" for project rows
          if (task.type === 'project') {
            return `<span style="font-size:11px; color:var(--bs-secondary-color);
                             font-style:italic;">Projekt</span>`;
          }
          if (task.resource_label) {
            return `<span style="font-size:12px;">${task.resource_label}</span>`;
          }
          return `<span style="font-size:11px; color:var(--bs-secondary-color);">—</span>`;
        }
      },
      ...baseColumns,
    ];
  } else {
    gantt.config.columns = baseColumns;
  }
  gantt.render();
}

// ── CSRF helper ───────────────────────────────────────────────
function getCsrfToken() {
  return document.cookie.split(';')
    .find(c => c.trim().startsWith('csrftoken='))
    ?.split('=')[1] ?? '';
}
</script>
{% endblock %}

{% load static kanban_tags %}

<div class="kanban-board d-flex gap-3 overflow-x-auto pb-3">
    {% for status, label in status_choices %}
    <div class="kanban-column flex-shrink-0"
         data-status="{{ status }}"
         style="width: 280px; min-width: 280px;">

        <div class="kanban-column-header d-flex align-items-center justify-content-between mb-2">
            <span>{{ label }}</span>
            <span class="badge bg-secondary">{{ columns|get_item:status|length }}</span>
        </div>

        <div class="kanban-cards sortable-list" id="col-{{ status }}" data-status="{{ status }}">
            {% for task in columns|get_item:status %}
                {% include 'tasks/partials/card.html' with task=task %}
            {% endfor %}
        </div>

        <!-- Quick add form at bottom of column -->
        <div class="kanban-quick-add mt-2">
            {% if active_filters.project %}
            <button class="btn btn-sm btn-outline-secondary w-100"
                    hx-get="{% url 'tasks:task-create' %}?status={{ status }}&project_id={{ active_filters.project }}"
                    hx-target="#quick-add-{{ status }}"
                    hx-swap="innerHTML">
                <i class="bi bi-plus"></i> Add task
            </button>
            {% else %}
            <button class="btn btn-sm btn-outline-secondary w-100" disabled title="Select a project to add tasks">
                <i class="bi bi-plus"></i> Add task
            </button>
            {% endif %}
            <div id="quick-add-{{ status }}"></div>
        </div>

    </div>
    {% endfor %}
</div>

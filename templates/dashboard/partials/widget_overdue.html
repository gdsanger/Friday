{% load static %}
<div class="kpi-card {% if count > 0 %}kpi-card-danger{% endif %}"
     hx-get="{% url 'dashboard:widget-overdue' %}"
     hx-trigger="every 60s"
     hx-target="this"
     hx-swap="outerHTML">
    <div class="kpi-label">Overdue</div>
    <div class="kpi-value">
        {{ count }}
        {% if count > 0 %}<i class="bi bi-exclamation-triangle-fill text-danger ms-2"></i>{% endif %}
    </div>
    <a href="{% url 'kanban:kanban-board' %}?view=mine_assigned&due=overdue" class="kpi-link">View all →</a>
</div>

{% load static %}
<div class="widget-header">
  <span class="widget-title">Projekt Status</span>
  <a href="{% url 'projects:project-list' %}"
     style="font-size:11px; color:var(--friday-accent);
            text-decoration:none;">
    Alle anzeigen →
  </a>
</div>

{% for project in projects %}
<div class="d-flex align-items-center gap-3 mb-3">

  <!-- Farbpunkt -->
  <span class="rounded-circle flex-shrink-0"
        style="width:10px;height:10px;
               background:{{ project.color }};
               display:inline-block;"></span>

  <!-- Name + Fortschritt -->
  <div class="flex-grow-1 min-width-0">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <a href="{% url 'projects:project-detail' project.pk %}"
         class="text-decoration-none fw-medium"
         style="font-size:13px; color:var(--friday-text);
                white-space:nowrap; overflow:hidden;
                text-overflow:ellipsis; max-width:200px;">
        {{ project.name }}
      </a>
      <span style="font-size:11px; color:var(--friday-text-muted);
                   font-family:var(--font-mono); flex-shrink:0; margin-left:8px;">
        {{ project.done_tasks }}/{{ project.total_tasks }}
      </span>
    </div>
    <div class="progress" style="height:6px; background:var(--friday-border);">
      <div class="progress-bar"
           style="width:{{ project.pct }}%;
                  background:{{ project.color }};
                  border-radius:3px;">
      </div>
    </div>
  </div>

  <!-- Status Badge -->
  <span class="badge flex-shrink-0"
        style="font-size:10px;
               background:{% if project.status == 'active' %}var(--friday-success-light){% else %}var(--friday-surface-alt){% endif %};
               color:{% if project.status == 'active' %}var(--friday-success){% else %}var(--friday-text-muted){% endif %};">
    {{ project.get_status_display }}
  </span>

</div>
{% empty %}
<div class="text-center py-3 text-muted">
  <i class="bi bi-folder" style="font-size:24px; opacity:.3;"></i>
  <p class="mt-2 mb-0" style="font-size:13px;">
    Keine Projekte verfügbar
  </p>
</div>
{% endfor %}

{% load static %}
<div class="kpi-card"
     hx-get="{% url 'dashboard:widget-due-week' %}"
     hx-trigger="every 60s"
     hx-target="this"
     hx-swap="outerHTML">
    <div class="kpi-label">Due this week</div>
    <div class="kpi-value">{{ count }}</div>
    <a href="{% url 'kanban:kanban-board' %}" class="kpi-link">View all →</a>
</div>

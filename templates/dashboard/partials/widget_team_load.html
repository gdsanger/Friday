{% load static %}
<div class="dashboard-widget"
     id="widget-team-load"
     hx-get="{% url 'dashboard:widget-team-load' %}"
     hx-trigger="every 60s"
     hx-target="this"
     hx-swap="outerHTML">
    <div class="widget-header">
        <h5 class="widget-title">Team Load</h5>
    </div>
    <div class="widget-body">
        {% if team_data %}
            {% for item in team_data %}
                <div class="team-load-row mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="team-name">{{ item.team.name }}</span>
                        <span class="team-count badge bg-secondary">{{ item.open }} open</span>
                    </div>
                    <div class="progress" style="height: 8px;">
                        <div class="progress-bar bg-primary"
                             role="progressbar"
                             style="width: {% widthratio item.open item.max_open 100 %}%"
                             aria-valuenow="{{ item.open }}"
                             aria-valuemin="0"
                             aria-valuemax="{{ item.max_open }}"></div>
                    </div>
                    <a href="{% url 'kanban:kanban-board' %}?team={{ item.team.pk }}" class="stretched-link team-link"></a>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <p class="text-muted mb-0">You are not a member of any teams yet.</p>
            </div>
        {% endif %}
    </div>
</div>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Friday - Project Management{% endblock %}</title>

    <!-- Prevent flash of wrong theme -->
    <script>
        // Theme
        const _t = localStorage.getItem('friday-theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', _t);
        // Sidebar collapsed state (Desktop only)
        if (window.innerWidth > 992) {
            const _s = localStorage.getItem('friday-sidebar');
            if (_s === 'collapsed') {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('friday-sidebar')?.classList.add('collapsed');
                });
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- EasyMDE Markdown Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">

    <!-- Friday CSS -->
    <link rel="stylesheet" href="{% static 'css/friday.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="friday-layout">
        <!-- Sidebar -->
        {% include 'partials/sidebar.html' %}

        <!-- Main content area -->
        <div class="friday-main">
            <!-- Topbar -->
            {% include 'partials/topbar.html' %}

            <!-- Messages -->
            {% include 'partials/messages.html' %}

            <!-- Content -->
            <div class="friday-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Slide-over container for task details -->
    <div id="slide-over-backdrop"
         class="slide-over-backdrop"
         onclick="window.closeSlideOver()"></div>
    <div id="slide-over" class="slide-over"></div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Markdown Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- Friday JS -->
    <script src="{% static 'js/friday.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>

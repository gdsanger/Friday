{% extends "base.html" %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'tasks:checklist-template-list' %}"
     class="text-muted text-decoration-none" style="font-size:13px;">
    <i class="bi bi-arrow-left me-1"></i>Zurück
  </a>
  <h4 class="mb-0">Neue Vorlage</h4>
</div>

<div class="card border-0 shadow-sm p-4" style="max-width:600px;">
  <form method="POST">
    {% csrf_token %}

    <!-- Name -->
    <div class="mb-4">
      <label class="form-label fw-medium">Name *</label>
      <input type="text" name="name"
             value=""
             class="form-control" required
             placeholder="z.B. Standard Rollout">
    </div>

    <div class="d-flex gap-2">
      <a href="{% url 'tasks:checklist-template-list' %}"
         class="btn btn-outline-secondary">Abbrechen</a>
      <button type="submit" class="btn btn-primary">Erstellen</button>
    </div>
  </form>
</div>

{% endblock %}

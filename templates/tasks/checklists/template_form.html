{% extends 'base.html' %}
{% load static %}

{% block title %}Neue Checklisten-Vorlage{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Neue Checklisten-Vorlage</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">Name der Vorlage</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="z.B. Standard Rollout" required>
                            <div class="form-text">
                                Geben Sie einen aussagekräftigen Namen für die Vorlage ein.
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Erstellen</button>
                            <a href="{% url 'tasks:checklist-template-list' %}" class="btn btn-secondary">
                                Abbrechen
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

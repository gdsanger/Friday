{% extends "base.html" %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'tasks:checklist-template-list' %}"
     class="text-muted text-decoration-none" style="font-size:13px;">
    <i class="bi bi-arrow-left me-1"></i>Zurück
  </a>
  <h4 class="mb-0">Vorlage bearbeiten</h4>
</div>

<div class="card border-0 shadow-sm p-4" style="max-width:600px;">
  <form method="POST">
    {% csrf_token %}

    <!-- Name -->
    <div class="mb-4">
      <label class="form-label fw-medium">Name *</label>
      <input type="text" name="name"
             value="{{ template.name|default:'' }}"
             class="form-control" required
             placeholder="z.B. Standard Rollout">
    </div>

    <!-- Items -->
    <div class="mb-4">
      <label class="form-label fw-medium">Checklisten-Items</label>
      <div id="template-items">
        {% for item in template.items.all %}
        <div class="d-flex gap-2 mb-2 template-item-row">
          <input type="text" name="items[]"
                 value="{{ item.title }}"
                 class="form-control form-control-sm"
                 placeholder="Item-Bezeichnung">
          <button type="button"
                  class="btn btn-outline-danger btn-sm"
                  onclick="this.closest('.template-item-row').remove()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        {% endfor %}

        <!-- Leere Zeile für neue Items -->
        <div class="d-flex gap-2 mb-2 template-item-row">
          <input type="text" name="items[]"
                 class="form-control form-control-sm"
                 placeholder="Item-Bezeichnung">
          <button type="button"
                  class="btn btn-outline-danger btn-sm"
                  onclick="this.closest('.template-item-row').remove()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>

      <button type="button"
              class="btn btn-outline-secondary btn-sm mt-1"
              onclick="addTemplateItem()">
        <i class="bi bi-plus-lg me-1"></i>Item hinzufügen
      </button>
    </div>

    <div class="d-flex gap-2">
      <a href="{% url 'tasks:checklist-template-list' %}"
         class="btn btn-outline-secondary">Abbrechen</a>
      <button type="submit" class="btn btn-primary">Speichern</button>
    </div>
  </form>
</div>

<script>
function addTemplateItem() {
  const container = document.getElementById('template-items');
  const row = document.createElement('div');
  row.className = 'd-flex gap-2 mb-2 template-item-row';
  row.innerHTML = `
    <input type="text" name="items[]"
           class="form-control form-control-sm"
           placeholder="Item-Bezeichnung">
    <button type="button"
            class="btn btn-outline-danger btn-sm"
            onclick="this.closest('.template-item-row').remove()">
      <i class="bi bi-x-lg"></i>
    </button>
  `;
  container.appendChild(row);
  row.querySelector('input').focus();
}
</script>

{% endblock %}

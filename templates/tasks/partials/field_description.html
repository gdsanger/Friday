{% if mode == 'edit' %}
<form hx-post="{% url 'tasks:task-edit-field' task.pk %}"
      hx-target="this"
      hx-swap="outerHTML">
  {% csrf_token %}
  <input type="hidden" name="field" value="description">
  <textarea name="value"
            class="form-control md-editor"
            rows="6"
            autofocus>{{ task.description }}</textarea>
  <div class="d-flex gap-2 mt-2">
    <button type="submit" class="btn btn-primary btn-sm">Save</button>
    <button type="button"
            class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'tasks:task-edit-field' task.pk %}?mode=view&field=description"
            hx-target="closest form"
            hx-swap="outerHTML">Cancel</button>
  </div>
</form>
{% else %}
<div class="task-description"
     hx-get="{% url 'tasks:task-edit-field' task.pk %}?mode=edit&field=description"
     hx-target="this"
     hx-swap="outerHTML"
     style="cursor: pointer; min-height: 48px;">
  {% if task.description %}
  <div class="md-render"
       data-md="{{ task.description|escapejs }}">
  </div>
  {% else %}
  <span class="text-muted fst-italic" style="font-size:13px;">
    Beschreibung hinzufügen...
  </span>
  {% endif %}
  <div class="mt-1" style="font-size:11px; color:var(--friday-text-muted);">
    <i class="bi bi-pencil me-1"></i>Klicken zum Bearbeiten · Markdown wird unterstützt
  </div>
</div>
{% endif %}

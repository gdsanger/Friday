{% extends "mail/base.html" %}
{% block body %}
<h1 class="email-title">Task completed</h1>
<p class="email-text">Hello {{ recipient_name }},</p>
<p class="email-text">
  <strong>{{ done_by }}</strong> has marked a task as complete:
</p>

<div class="info-box">
  <div class="info-row">
    Task:
    <strong>{{ task_title }}</strong>
  </div>
  <div class="info-row">
    Project:
    {{ project_name }}
  </div>
  <div class="info-row">
    Status:
    <span class="badge badge-green">Done</span>
  </div>
</div>

<p style="margin:24px 0;">
  <a href="{{ task_url }}" class="email-btn">View Task</a>
</p>
{% endblock %}

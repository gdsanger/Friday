{% extends "mail/base.html" %}
{% block body %}
<h1 class="email-title">⚠️ Überfällige Aufgabe</h1>
<p class="email-text">Hallo {{ recipient_name }},</p>
<p class="email-text">
    Die folgende Aufgabe ist überfällig:
</p>

<div class="info-box">
  <div class="info-row">
    Aufgabe:
    <strong>{{ task_title }}</strong>
  </div>
  <div class="info-row">
    Projekt:
    {{ project_name }}
  </div>
  <div class="info-row">
    Fälligkeitsdatum:
    <strong style="color:#991b1b;">{{ due_date }}</strong>
  </div>
</div>

<p style="margin:24px 0;">
  <a href="{{ task_url }}" class="email-btn">Aufgabe öffnen</a>
</p>
{% endblock %}
